name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Update version in build_config.py
        shell: bash
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${{ steps.version.outputs.VERSION }}\"/" build_config.py

      - name: Build exe with PyInstaller
        run: pyinstaller llama_cpp_launcher.spec

      - name: Verify exe exists
        run: |
          if (!(Test-Path "dist\LlamaCppLauncher.exe")) {
            Write-Error "Build failed: exe not found"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Llama CPP Launcher v${{ steps.version.outputs.VERSION }}"
          files: dist/LlamaCppLauncher.exe
          generate_release_notes: true
          draft: false
          prerelease: false
